run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - gocritic
    - gofmt
    - gosimple
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: true
  gocritic:
    disabled-checks:
      - ifElseChain
      - singleCaseSwitch

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck